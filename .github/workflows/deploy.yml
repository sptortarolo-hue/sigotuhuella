name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
           script: |
             cd /var/www/sigotuhuella
             git pull
             # Instalar dependencias nativas requeridas por canvas y ffmpeg
             sudo apt-get update
             sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
             # Reconstruir canvas nativo
             npm rebuild canvas
             npm install
             npm run build
             pm2 restart sigotuhuella
