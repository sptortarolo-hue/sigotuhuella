name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
    - run: npm ci
    - name: Verify Google Client ID
      run: |
        ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
        echo "GOOGLE_CLIENT_ID length: ${#ID}"
        echo "GOOGLE_CLIENT_ID starts with: ${ID:0:20}..."
    - run: npm run build
      env:
        VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Prep env file
      run: |
        echo "AZURE_TTS_KEY=${{ secrets.AZURE_TTS_KEY }}" >> server/.env
        echo "AZURE_TTS_KEY2=${{ secrets.AZURE_TTS_KEY2 }}" >> server/.env
        echo "AZURE_TTS_REGION=${{ secrets.AZURE_TTS_REGION }}" >> server/.env
        echo "GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> server/.env
        echo "INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}" >> server/.env
        echo "INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}" >> server/.env
        echo "INSTAGRAM_REDIRECT_URI=${{ secrets.INSTAGRAM_REDIRECT_URI }}" >> server/.env
        echo "INSTAGRAM_VERIFY_TOKEN=${{ secrets.INSTAGRAM_VERIFY_TOKEN }}" >> server/.env
        echo "FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}" >> server/.env
        echo "FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}" >> server/.env
        echo "APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}" >> server/.env

    - name: List dist contents
      run: |
        echo "=== dist/assets ==="
        ls -la dist/assets/
        echo "=== dist/index.html ==="
        head -c 200 dist/index.html
      shell: bash

    - name: Write SSH key and deploy
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "=== OLD files on VPS ==="
        ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "head -c 300 /var/www/sigotuhuella/dist/index.html 2>&1 || echo 'NO dist/index.html'"
        echo "=== Transferring files ==="
        tar czf - dist/ server/ package.json | ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /var/www/sigotuhuella && tar xzf - && echo '=== NEW files deployed ===' && head -c 300 dist/index.html"
    - name: Write SSH key and deploy
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        tar czf - dist/ server/ package.json | ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /var/www/sigotuhuella && tar xzf - && echo '=== DEPLOYED FILES ===' && head -c 300 dist/index.html"
      shell: bash

    - name: Restart server
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          set -x
          cd /var/www/sigotuhuella
          kill -9 $(lsof -t -i:3000) 2>/dev/null || true
          sudo apt-get update -qq >/dev/null 2>&1
          sudo apt-get install -y --no-install-recommends ffmpeg build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev >/dev/null 2>&1
          npm install --production
          if [ -f /root/.sihuella-db.env ]; then
            cat /root/.sihuella-db.env >> server/.env
          fi
          if pm2 list | grep -q sigotuhuella; then
            pm2 delete sigotuhuella
          fi
          pm2 start npm --name sigotuhuella -- start --update-env
          pm2 save
