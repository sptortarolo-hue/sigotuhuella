name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
    script: |
      cd /var/www/sigotuhuella
      git pull
      # Instalar dependencias nativas requeridas por editly (headless-gl) + canvas + ffmpeg
      sudo apt-get update
      sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev pkg-config
      # Crear swap de 1GB si no existe (necesario para headless-gl en VPS 1GB RAM)
      if [ ! -f /swapfile ]; then
        sudo fallocate -l 1G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
      fi
      # Reconstruir modulos nativos (canvas, headless-gl)
      npm rebuild
      npm install
      npm run build
      pm2 restart sigotuhuella
