name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
    - run: npm ci
    - run: npm run build
      env:
        VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Prep env file
      run: |
        echo "AZURE_TTS_KEY=${{ secrets.AZURE_TTS_KEY }}" >> server/.env
        echo "AZURE_TTS_KEY2=${{ secrets.AZURE_TTS_KEY2 }}" >> server/.env
        echo "AZURE_TTS_REGION=${{ secrets.AZURE_TTS_REGION }}" >> server/.env
        echo "GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> server/.env
        echo "INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}" >> server/.env
        echo "INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}" >> server/.env
        echo "INSTAGRAM_REDIRECT_URI=${{ secrets.INSTAGRAM_REDIRECT_URI }}" >> server/.env
        echo "INSTAGRAM_VERIFY_TOKEN=${{ secrets.INSTAGRAM_VERIFY_TOKEN }}" >> server/.env
        echo "FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}" >> server/.env
        echo "FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}" >> server/.env
        echo "APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}" >> server/.env

    - name: Copy dist to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "dist/,server/,package.json"
        target: /var/www/sigotuhuella
        strip_components: 0

    - name: Remote deploy
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /var/www/sigotuhuella
          kill -9 $(lsof -t -i:3000) 2>/dev/null || true
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 1G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
          npm install --production
          # Restore DATABASE_URL from persistent storage (never overwritten by deploy)
          if [ -f /root/.sihuella-db.env ]; then
            cat /root/.sihuella-db.env >> server/.env
          fi
          if pm2 list | grep -q sigotuhuella; then
            pm2 delete sigotuhuella
          fi
          pm2 start npm --name sigotuhuella -- start --update-env
          pm2 save
