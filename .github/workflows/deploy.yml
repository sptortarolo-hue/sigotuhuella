name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /var/www/sigotuhuella
          git pull

          if [ ! -f /swapfile ]; then
            sudo fallocate -l 1G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev pkg-config

          npm install || npm install --ignore-scripts
          if [ ! -d node_modules/editly ]; then
            echo "WARN: editly no se installo, instalando con --ignore-scripts y rebuild canvas"
            npm install --ignore-scripts
            npm rebuild canvas 2>/dev/null || true
          fi

          npm run build
          pm2 restart sigotuhuella || pm2 start npm --name sigotuhuella -- start
