name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'
    - run: npm ci
    - run: npm run build
      env:
        VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
    - uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

    - name: Prep env file
      run: |
        echo "AZURE_TTS_KEY=${{ secrets.AZURE_TTS_KEY }}" >> server/.env
        echo "AZURE_TTS_KEY2=${{ secrets.AZURE_TTS_KEY2 }}" >> server/.env
        echo "AZURE_TTS_REGION=${{ secrets.AZURE_TTS_REGION }}" >> server/.env
        echo "GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> server/.env
        echo "INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}" >> server/.env
        echo "INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}" >> server/.env
        echo "INSTAGRAM_REDIRECT_URI=${{ secrets.INSTAGRAM_REDIRECT_URI }}" >> server/.env
        echo "INSTAGRAM_VERIFY_TOKEN=${{ secrets.INSTAGRAM_VERIFY_TOKEN }}" >> server/.env
        echo "FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}" >> server/.env
        echo "FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}" >> server/.env
        echo "APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}" >> server/.env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> server/.env
        echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> server/.env
        echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> server/.env
        echo "NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}" >> server/.env
        echo "WHATSAPP_AI_PRIMARY=${{ secrets.WHATSAPP_AI_PRIMARY }}" >> server/.env
        echo "RELAY_TOKEN=${{ secrets.RELAY_TOKEN }}" >> server/.env

    - name: Check disk space on VPS
      continue-on-error: true
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: df -h /var/www/sigotuhuella
        debug: true

    - name: Test SSH connection
      continue-on-error: true
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh -vvv -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo OK" 2>&1
      shell: bash

    - name: Transfer files to VPS
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /var/www/sigotuhuella && rm -rf /var/www/sigotuhuella/dist"
        tar czf - dist/ server/ package.json | ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /var/www/sigotuhuella && tar xzf -"
      shell: bash

    - name: Restart server
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        command_timeout: 15m
        script: |
          set -x
          # Install system deps only if missing (skip apt update — packages are stable)
          if ! command -v ffmpeg &>/dev/null; then
            sudo apt-get update -qq >/dev/null 2>&1
            sudo apt-get install -y --no-install-recommends ffmpeg build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev >/dev/null 2>&1
          fi
          cd /var/www/sigotuhuella
          npm install --production
          # Restore DATABASE_URL (never overwritten by deploy)
          if [ -f /root/.sihuella-db.env ]; then
            grep -q 'DATABASE_URL' server/.env 2>/dev/null || cat /root/.sihuella-db.env >> server/.env
          fi
          # Start our app with PM2
          pm2 delete sigotuhuella 2>/dev/null || true
          pm2 start npm --name sigotuhuella --update-env -- start
          pm2 save
